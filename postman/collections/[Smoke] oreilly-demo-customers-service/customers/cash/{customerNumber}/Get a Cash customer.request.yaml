type: http
name: Get a Cash customer
url: '{{baseUrl}}/customers/cash/:customerNumber'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: customerNumber
    value: '70004567'
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "customerType": "cash",
            "customerNumbers": [
              70004567
            ],
            "firstName": "Casey",
            "lastName": "Driver",
            "preferredPhone": "417-555-0177",
            "preferredEmail": "casey.driver@example.com",
            "addresses": [
              {
                "line1": "55 Market Street",
                "city": "Springfield",
                "state": "MO",
                "postalCode": "65806",
                "countryCode": "US"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Cash customer record
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Requested resource was not found.
