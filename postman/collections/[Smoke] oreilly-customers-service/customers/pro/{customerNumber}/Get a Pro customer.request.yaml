type: http
name: Get a Pro customer
url: '{{baseUrl}}/customers/pro/:customerNumber'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: customerNumber
    value: '2398'
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "customerType": "pro",
            "customerNumber": 90001234,
            "customerName": "OReilly Test Garage",
            "customerAddress": "123 Pilot Way",
            "customerCity": "Springfield",
            "customerState": "MO",
            "customerZipCode": "65807",
            "customerPhone": "417-555-0188",
            "accountNotes": "Preferred commercial account",
            "activityCode": "ACTIVE",
            "customerTypeDesc": "Professional installer"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Pro customer record
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Requested resource was not found.
