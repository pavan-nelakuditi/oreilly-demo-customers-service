type: http
name: Get a Pro customer
url: '{{baseUrl}}/customers/pro/:customerNumber'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: customerNumber
    value: '90001234'
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "customerType": "pro",
            "customerNumber": 90001234,
            "customerName": "OReilly Test Garage",
            "customerAddress": "123 Pilot Way",
            "customerCity": "Springfield",
            "customerState": "MO",
            "customerZipCode": "65807",
            "customerPhone": "417-555-0188",
            "accountNotes": "Preferred commercial account",
            "activityCode": "ACTIVE",
            "customerTypeDesc": "Professional installer"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Pro customer record
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "correlationId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Requested resource was not found.
