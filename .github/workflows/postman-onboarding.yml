name: Postman Onboarding

on:
  workflow_dispatch:

jobs:
  onboarding:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      variables: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/oreilly-shared-contracts', github.repository_owner) }}
          ref: v0
          path: shared-contracts
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Validate and bundle spec
        run: npm run validate:specs
      - name: Publish bundled spec branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          rm -rf /tmp/bundled-spec
          mkdir -p /tmp/bundled-spec
          cd /tmp/bundled-spec
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp "$GITHUB_WORKSPACE/dist/openapi.bundled.yaml" ./openapi.yaml
          git add openapi.yaml
          git commit -m "chore: publish bundled spec"
          git branch -M bundled-specs
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin bundled-specs
      - name: Run Postman API onboarding
        uses: postman-cs/postman-api-onboarding-action@main
        with:
          project-name: ${{ github.event.repository.name }}
          spec-path: dist/openapi.bundled.yaml
          spec-url: https://raw.githubusercontent.com/${{ github.repository }}/bundled-specs/openapi.yaml
          generate-ci-workflow: false
          repo-write-mode: commit-only
          domain: workshop-pilot
          domain-code: OR
          requester-email: workshop.owner@example.com
          environments-json: '["stage"]'
          env-runtime-urls-json: '{"stage":"https://stage.api.example.com"}'
          governance-mapping-json: '{"workshop-pilot":"Workshop Pilot"}'
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
